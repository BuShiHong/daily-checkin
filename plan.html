<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日打卡</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'PingFang SC','Microsoft YaHei',sans-serif; background:#0f0f1a; color:#e0e0e0; min-height:100vh; }

header { background:linear-gradient(135deg,#1a1a2e,#16213e); padding:36px 20px 28px; text-align:center; border-bottom:1px solid #2a2a4a; }
header h1 { font-size:1.8rem; background:linear-gradient(90deg,#7c6af7,#a78bfa,#60a5fa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px; }
.date-display { margin-top:10px; font-size:1rem; color:#a78bfa; font-weight:600; }

.container { max-width:700px; margin:0 auto; padding:28px 20px; }

/* streak */
.streak-bar { background:#1a1a2e; border:1px solid #2a2a4a; border-radius:16px; padding:20px 24px; display:flex; align-items:center; gap:20px; margin-bottom:28px; }
.streak-num { font-size:2.8rem; font-weight:800; background:linear-gradient(90deg,#f97316,#facc15); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; }
.streak-right { flex:1; }
.streak-sub { font-size:0.82rem; color:#888; margin-bottom:8px; }
.progress-wrap { background:#2a2a4a; border-radius:10px; height:8px; overflow:hidden; }
.progress-bar { height:100%; background:linear-gradient(90deg,#7c6af7,#60a5fa); border-radius:10px; transition:width 0.4s; }
.progress-text { font-size:0.8rem; color:#aaa; margin-top:6px; }
.reset-btn { background:none; border:1px solid #3a3a5a; color:#666; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:0.78rem; transition:all 0.2s; white-space:nowrap; }
.reset-btn:hover { border-color:#f87171; color:#f87171; }

/* calendar */
.section-title { font-size:1rem; font-weight:700; color:#a78bfa; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.section-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,#2a2a4a,transparent); }
.section { margin-bottom:32px; }

.calendar { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
.cal-header { font-size:0.68rem; color:#555; text-align:center; padding-bottom:3px; }
.cal-day { aspect-ratio:1; border-radius:6px; background:#1a1a2e; border:1px solid #222; display:flex; align-items:center; justify-content:center; font-size:0.72rem; color:#444; }
.cal-day.has-data { background:#1e1535; border-color:#4a3a8a; color:#888; }
.cal-day.full { background:#2d1b69; border-color:#7c6af7; color:#c4b5fd; font-weight:700; }
.cal-day.today { border-color:#60a5fa !important; color:#60a5fa !important; font-weight:700; }

/* habits */
.habits { display:flex; flex-direction:column; gap:10px; }
.habit { display:flex; align-items:center; gap:14px; background:#1a1a2e; border:1px solid #2a2a4a; border-radius:12px; padding:14px 16px; cursor:pointer; transition:all 0.2s; user-select:none; }
.habit:hover { border-color:#4a4a7a; }
.habit.done { background:#141f14; border-color:#2d4a2d; }
.habit.done .habit-text { text-decoration:line-through; color:#555; }
.habit.done .habit-note { color:#3a5a3a; }
.checkbox { width:24px; height:24px; border-radius:7px; border:2px solid #3a3a6a; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.habit.done .checkbox { background:#4ade80; border-color:#4ade80; }
.check-icon { display:none; }
.habit.done .check-icon { display:block; }
.habit-body { flex:1; }
.habit-text { font-size:0.95rem; }
.habit-note { font-size:0.78rem; color:#555; margin-top:3px; }
.habit-emoji { font-size:1.3rem; flex-shrink:0; }

/* milestones */
.milestones { display:flex; flex-direction:column; gap:0; }
.milestone { display:flex; gap:16px; padding:14px 0; border-bottom:1px solid #1e1e30; }
.milestone:last-child { border-bottom:none; }
.ms-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; margin-top:4px; }
.ms-body { flex:1; }
.ms-title { font-size:0.92rem; color:#ddd; }
.ms-note { font-size:0.78rem; color:#555; margin-top:3px; }
.ms-tag { display:inline-block; font-size:0.7rem; padding:1px 8px; border-radius:10px; margin-right:6px; }
</style>
</head>
<body>

<header>
  <h1>🚀 每日打卡</h1>
  <div class="date-display" id="dateDisplay"></div>
</header>

<div class="container">

  <div class="streak-bar">
    <div>
      <div class="streak-num" id="streakNum">0</div>
      <div style="font-size:0.8rem;color:#888;margin-top:2px;">连续打卡 🔥</div>
    </div>
    <div class="streak-right">
      <div class="streak-sub">今日进度 <span id="doneCount">0</span> / <span id="totalCount">0</span></div>
      <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">完成全部任务即打卡成功</div>
    </div>
    <button class="reset-btn" onclick="resetToday()">重置今日</button>
  </div>

  <div class="section">
    <div class="section-title">📅 本月打卡</div>
    <div id="calendarWrap"></div>
  </div>

  <div class="section">
    <div class="section-title">✅ 今日任务</div>
    <div class="habits" id="habitList"></div>
  </div>

  <div class="section">
    <div class="section-title">🎯 长期里程碑</div>
    <div class="milestones" id="milestoneList"></div>
  </div>

</div>

<script>
const HABITS = [
  { id:'h1', emoji:'📚', text:'背单词', note:'每日至少20个，推荐墨墨/不背单词' },
  { id:'h2', emoji:'🧘', text:'冥想', note:'10分钟，早起或睡前' },
  { id:'h3', emoji:'✍️', text:'练字', note:'每日一页，专注当下' },
  { id:'h4', emoji:'💻', text:'写 LeetCode', note:'至少1题，Hot 100 优先' },
  { id:'h5', emoji:'🔬', text:'读前沿论文 / 技术报告', note:'30分钟，Arxiv 或大厂博客' },
  { id:'h6', emoji:'📖', text:'读书', note:'30分钟，技术书或认知提升类' },
  { id:'h7', emoji:'🧠', text:'整理今日所学', note:'写笔记，不懂的概念当天补' },
];

const MILESTONES = [
  { color:'#f87171', tag:'第1年', title:'定方向 + 补基础 + 拿到第一段实习 offer', note:'LLM算法 / GUI Agent / SDE 三选一，不再摇摆' },
  { color:'#f87171', tag:'第1年', title:'读完方向核心论文10篇，能复述核心思想', note:'BERT → Transformer → GPT → InstructGPT → LoRA …' },
  { color:'#fb923c', tag:'第2年', title:'完成第二段实习（目标大厂或顶尖组）', note:'两段实习是逆转的关键' },
  { color:'#fb923c', tag:'第2年', title:'完成一个有质量的项目或论文', note:'有论文加分，没有也要有拿得出手的项目' },
  { color:'#facc15', tag:'出国线', title:'发1-2篇论文，准备申请材料', note:'不必执着MIT，有LLM/Agent方向的学校都值得' },
  { color:'#4ade80', tag:'第3年', title:'冲击目标 offer，总包100w+', note:'两段实习 + 项目 + 方向对口 = 有竞争力' },
];

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getStore() { try { return JSON.parse(localStorage.getItem('planData')||'{}'); } catch { return {}; } }
function saveStore(d) { localStorage.setItem('planData', JSON.stringify(d)); }

function renderHabits() {
  const store = getStore(), today = todayKey(), td = store[today]||{};
  document.getElementById('habitList').innerHTML = HABITS.map(h => {
    const done = !!td[h.id];
    return `<div class="habit${done?' done':''}" onclick="toggle('${h.id}')">
      <div class="habit-emoji">${h.emoji}</div>
      <div class="checkbox">
        <svg class="check-icon" width="13" height="11" viewBox="0 0 13 11" fill="none">
          <path d="M1.5 5.5L5 9L11.5 1.5" stroke="#0f0f1a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="habit-body">
        <div class="habit-text">${h.text}</div>
        <div class="habit-note">${h.note}</div>
      </div>
    </div>`;
  }).join('');
}

function renderMilestones() {
  document.getElementById('milestoneList').innerHTML = MILESTONES.map(m =>
    `<div class="milestone">
      <div class="ms-dot" style="background:${m.color}"></div>
      <div class="ms-body">
        <div class="ms-title"><span class="ms-tag" style="background:${m.color}22;color:${m.color}">${m.tag}</span>${m.title}</div>
        <div class="ms-note">${m.note}</div>
      </div>
    </div>`
  ).join('');
}

function renderStats() {
  const store = getStore(), today = todayKey(), td = store[today]||{};
  const done = HABITS.filter(h => td[h.id]).length, total = HABITS.length;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('progressBar').style.width = (done/total*100)+'%';
  document.getElementById('progressText').textContent = done===total ? '🎉 今日打卡完成！' : '完成全部任务即打卡成功';

  let streak = 0;
  const d = new Date();
  for (let i=0; i<365; i++) {
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const day = store[key]||{};
    if (HABITS.every(h => day[h.id])) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  document.getElementById('streakNum').textContent = streak;
}

function renderCalendar() {
  const store = getStore();
  const now = new Date(), year = now.getFullYear(), month = now.getMonth();
  const today = todayKey();
  const firstDay = new Date(year, month, 1).getDay();
  const days = new Date(year, month+1, 0).getDate();
  let html = '<div class="calendar">';
  ['日','一','二','三','四','五','六'].forEach(w => html += `<div class="cal-header">${w}</div>`);
  for (let i=0;i<firstDay;i++) html += '<div class="cal-day"></div>';
  for (let d=1;d<=days;d++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const day = store[key]||{};
    const done = HABITS.filter(h=>day[h.id]).length;
    const cls = done===HABITS.length ? 'full' : done>0 ? 'has-data' : '';
    const isToday = key===today ? ' today' : '';
    html += `<div class="cal-day ${cls}${isToday}">${d}</div>`;
  }
  html += '</div>';
  document.getElementById('calendarWrap').innerHTML = html;
}

function toggle(id) {
  const store = getStore(), today = todayKey();
  if (!store[today]) store[today] = {};
  store[today][id] = !store[today][id];
  saveStore(store);
  renderAll();
}

function resetToday() {
  if (!confirm('重置今日所有打卡？')) return;
  const store = getStore(); delete store[todayKey()]; saveStore(store); renderAll();
}

function renderAll() { renderHabits(); renderStats(); renderCalendar(); }

const now = new Date();
document.getElementById('dateDisplay').textContent =
  `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 · ${['周日','周一','周二','三','周四','周五','周六'][now.getDay()]}`;

renderMilestones();
renderAll();
</script>
</body>
</html>
